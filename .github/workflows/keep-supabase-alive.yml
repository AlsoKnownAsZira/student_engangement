# ═══════════════════════════════════════════════════════════════════
# Keep Supabase project alive — prevent auto-pause on free tier
# Runs every 3 days, sends a simple DB query to register activity
# ═══════════════════════════════════════════════════════════════════

name: Keep Supabase Alive

on:
  schedule:
    # Runs at 08:14 UTC every 3 days (off-peak time to avoid GitHub Actions delays)
    - cron: "14 8 */3 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ping Supabase Database (Node.js SDK)
        run: |
          echo "Pinging REST API using Node to simulate real client..."
          node -e "
            fetch('${{ secrets.SUPABASE_URL }}/rest/v1/analyses?select=id&limit=1', {
              headers: {
                'apikey': '${{ secrets.SUPABASE_KEY }}',
                'Authorization': 'Bearer ${{ secrets.SUPABASE_KEY }}',
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
              }
            }).then(r => {
              console.log('Database Ping Status:', r.status);
              if (!r.ok) process.exit(1);
            }).catch(e => {
              console.error(e);
              process.exit(1);
            });
          "

      - name: Ping Supabase Auth (Node.js SDK)
        run: |
          echo "Pinging Auth using Node..."
          node -e "
            fetch('${{ secrets.SUPABASE_URL }}/auth/v1/settings', {
              headers: {
                'apikey': '${{ secrets.SUPABASE_KEY }}',
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
              }
            }).then(r => {
              console.log('Auth Ping Status:', r.status);
            }).catch(e => console.error(e));
          "
