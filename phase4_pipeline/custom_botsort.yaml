# =============================================================================
# Custom BotSORT Tracker Configuration - Optimized untuk CCTV Kelas
# =============================================================================
# Perubahan dari default:
#   - track_high_thresh: 0.3 → 0.2 (terima deteksi confidence lebih rendah)
#   - track_low_thresh: 0.1 → 0.05 (pertahankan track walau confidence sangat rendah)
#   - new_track_thresh: 0.3 → 0.4 (harus lebih yakin untuk bikin ID baru)
#   - track_buffer: 30 → 60 (tahan track hilang sampai 4 detik @15fps)
#   - match_thresh: 0.8 → 0.85 (lebih toleran matching)
# =============================================================================

tracker_type: botsort

# --- Detection Thresholds ---
track_high_thresh: 0.2        # Deteksi di atas threshold ini langsung di-track
track_low_thresh: 0.05        # Deteksi di bawah ini diabaikan; antara low-high = "second chance"
new_track_thresh: 0.4         # Threshold untuk membuat track/ID BARU (lebih tinggi = lebih selektif)
fuse_score: true              # Gabungkan detection score ke distance metric (required by newer Ultralytics)

# --- Track Retention ---
track_buffer: 60              # Jumlah frame track dipertahankan tanpa deteksi (60 frame ≈ 4 detik @15fps)
match_thresh: 0.85            # IoU matching threshold (lebih tinggi = lebih toleran)

# --- Appearance & Motion ---
proximity_thresh: 0.5         # Spatial proximity threshold
appearance_thresh: 0.25       # Appearance similarity threshold
cmc_method: sparseOptFlow     # Camera Motion Compensation via sparse optical flow

# --- Video Properties ---
frame_rate: 15                # FPS video CCTV kelas

# --- Re-Identification ---
with_reid: false              # Matikan ReID (overhead tinggi, CCTV statis tidak butuh)

# --- Kalman Filter ---
gmc_method: sparseOptFlow     # Global Motion Compensation method
